{% extends 'base.html' %}
{% block title %}Gallery | CharityOrg{% endblock %}
{% block content %}
<section class="py-5">
    <div class="container">
        <div class="text-center mb-5">
            <h1 class="display-4 fw-bold text-white">Photo & Video <span style="color: #64ffda;">Gallery</span></h1>

        </div>
        
        <div class="row g-4">

                <div class="gallery-item shadow-sm">
                    <div style="height: 300px; background: #112240; display: flex; align-items: center; justify-content: center;">
                        <img src="{{ url_for('static', filename='images/gallery1.jpg') }}" onerror="this.style.display='none'; this.parentNode.innerHTML='<i class=\'fas fa-image fa-2x text-muted\'></i><p class=\'text-muted ms-2\'>[gallery1.jpg]</p>'" class="img-fluid w-100 h-100 object-fit-cover" alt="Gallery 1">
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="gallery-item shadow-sm">
                    <div style="height: 300px; background: #112240; display: flex; align-items: center; justify-content: center;">
